name: Sync Upstream Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Upstream version tag (e.g. v0.8.6)'
        required: true
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream tag
        run: |
          git remote add upstream https://github.com/danny-avila/LibreChat.git
          git fetch upstream tag ${{ inputs.version }} --no-tags

      - name: Create sync branch
        run: |
          git push origin --delete sync/upstream-${{ inputs.version }} 2>/dev/null || true
          git branch -D sync/upstream-${{ inputs.version }} 2>/dev/null || true
          git checkout -b sync/upstream-${{ inputs.version }}

      # ── 1. Merge ──────────────────────────────────────────────────
      - name: Merge upstream tag
        id: merge
        run: |
          if ! git merge ${{ inputs.version }} --no-edit; then
            echo "failed=true" >> $GITHUB_OUTPUT
            git diff --name-only --diff-filter=U > /tmp/conflicts.txt || true
            git merge --abort || true
          fi

      - name: Issue on merge failure
        if: steps.merge.outputs.failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const conflicts = require('fs').readFileSync('/tmp/conflicts.txt', 'utf8').trim();
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `⚠️ Upstream sync ${{ inputs.version }}: Merge-Konflikte`,
              labels: ['upstream-sync'],
              body: `## Merge fehlgeschlagen\n\n**Konflikte:**\n\`\`\`\n${conflicts}\n\`\`\`\n\n[Workflow-Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });

      - name: Abort on merge failure
        if: steps.merge.outputs.failed == 'true'
        run: exit 1

      # ── 2. Approval-Check ─────────────────────────────────────────
      - name: Check approval integration
        id: approval
        run: |
          ERRORS=""
          for f in \
            "api/server/routes/approval.js" \
            "api/server/services/ApprovalService.js" \
            "client/src/components/Approval/ApprovalModal.tsx" \
            "client/src/components/Approval/ApprovalProvider.tsx"; do
            [ -f "$f" ] || ERRORS="${ERRORS}- Datei fehlt: ${f}\n"
          done
          grep -q "approvalRouter" api/server/index.js \
            || ERRORS="${ERRORS}- approvalRouter fehlt in api/server/index.js\n"
          grep -q "ApprovalProvider" client/src/routes/Root.tsx \
            || ERRORS="${ERRORS}- ApprovalProvider fehlt in client/src/routes/Root.tsx\n"
          if [ -n "$ERRORS" ]; then
            echo "failed=true" >> $GITHUB_OUTPUT
            printf "%b" "$ERRORS" > /tmp/approval-errors.txt
          fi

      - name: Issue on approval failure
        if: steps.approval.outputs.failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const errors = require('fs').readFileSync('/tmp/approval-errors.txt', 'utf8').trim();
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `⚠️ Upstream sync ${{ inputs.version }}: Approval-Integration beschädigt`,
              labels: ['upstream-sync', 'bug'],
              body: `## Approval-Checks fehlgeschlagen\n\n${errors}\n\n**Manuelle Reparatur erforderlich.**\n\n[Workflow-Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });

      - name: Abort on approval failure
        if: steps.approval.outputs.failed == 'true'
        run: exit 1

      # ── 3. Upstream-Workflows entfernen ───────────────────────────
      - name: Remove upstream-only workflows
        run: |
          changed=false
          for wf in \
            build.yml client.yml data-provider.yml data-schemas.yml \
            deploy-dev.yml deploy.yml dev-branch-images.yml dev-images.yml \
            dev-staging-images.yml generate_embeddings.yml gitnexus-deploy.yml \
            gitnexus-index.yml helmcharts.yml locize-i18n-sync.yml main-image-workflow.yml; do
            if [ -f ".github/workflows/$wf" ]; then
              git rm ".github/workflows/$wf"
              changed=true
            fi
          done
          $changed && git commit -m "chore: remove upstream-only workflows (${{ inputs.version }})" || true

      # ── 4. Security Scan ──────────────────────────────────────────
      - name: Trivy security scan
        id: trivy
        uses: aquasecurity/trivy-action@0.29.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-results.txt
          severity: CRITICAL,HIGH
          exit-code: '1'

      # ── 5. PR erstellen ───────────────────────────────────────────
      - name: Push branch
        run: git push origin sync/upstream-${{ inputs.version }}

      - name: Create pull request
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const trivyOk = '${{ steps.trivy.outcome }}' === 'success';
            const badge = trivyOk ? '✅ Keine kritischen Findings' : '⚠️ Findings vorhanden';
            let trivy = fs.existsSync('trivy-results.txt')
              ? fs.readFileSync('trivy-results.txt', 'utf8').trim().substring(0, 3000)
              : 'Keine Findings';

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `chore: sync upstream ${{ inputs.version }}`,
              head: `sync/upstream-${{ inputs.version }}`,
              base: 'main',
              body: [
                `## Upstream Sync: \`${{ inputs.version }}\``,
                '',
                '### Checks',
                '- ✅ Merge erfolgreich',
                '- ✅ Approval-Integration intakt',
                '- ✅ Upstream-only Workflows entfernt',
                `- ${badge}`,
                '',
                '<details><summary>Trivy Details</summary>\n\n```\n' + trivy + '\n```\n</details>',
                '',
                '> Nach Merge baut `docker-build.yml` automatisch `ghcr.io/demos-europe/librechat:latest`.'
              ].join('\n')
            });
            core.info(`PR: ${pr.html_url}`);
